{{- if and .Values.appSecrets.enabled .Values.appSecrets.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.appSecrets.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: education-platform
{{- end }}
{{- if .Values.appSecrets.enabled }}
{{- $namespace := .Values.appSecrets.namespace -}}
{{- $services := list
  (dict "name" "auth"    "user" "auth_user"    "schema" "auth"    "pass" .Values.passwords.auth)
  (dict "name" "users"   "user" "users_user"   "schema" "users"   "pass" .Values.passwords.users)
  (dict "name" "tests"   "user" "tests_user"   "schema" "tests"   "pass" .Values.passwords.tests)
  (dict "name" "llm"     "user" "llm_user"     "schema" "llm"     "pass" .Values.passwords.llm)
  (dict "name" "reports" "user" "reports_user" "schema" "reports" "pass" .Values.passwords.reports)
-}}
{{- range $services }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}-db
  namespace: {{ $namespace | quote }}
  labels:
    app.kubernetes.io/part-of: education-platform
    app.kubernetes.io/component: db-credentials
type: Opaque
stringData:
  DB_USER: {{ .user | quote }}
  DB_PASSWORD: {{ .pass | quote }}
  DB_SCHEMA: {{ .schema | quote }}
{{- end }}
{{- end }}

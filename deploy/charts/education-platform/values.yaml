global:
  imageRegistry: harbor.mokryakov.local/library

  imagePullSecrets:
    - name: harbor-pull-secret

  serviceAccount:
    create: true
    name: education-platform

  postgres:
    host: education-postgresql.database.svc.cluster.local
    port: "5432"
    database: education
    dbNamespace: database

  secrets:
    jwt:
      name: jwt-secret
    internalJwt:
      name: internal-jwt-secret

# GigaChat API credentials (Authorization Key from developers.sber.ru).
# create: false — создайте Secret вручную: kubectl -n app create secret generic gigachat-creds --from-literal=LLM_API_KEY='...'
gigachat:
  secret:
    create: false
    name: gigachat-creds
    apiKey: ""
  # Сертификаты НУЦ Минцифры для TLS к GigaChat (developers.sber.ru/docs/ru/gigachat/certificates)
  mincifryCa:
    enabled: true
    configMapName: russian-trusted-ca

defaults:
  replicaCount: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6

services:
  auth-service:
    enabled: true
    port: 8080
    image:
      repository: auth-service
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: auth-service-migrate
        tag: c15c7f1
    db:
      existingSecret: auth-db
    env:
      SERVICE_NAME: auth-service
      DB_SSL_MODE: disable
      USER_SERVICE_URL: http://user-service:8080

  user-service:
    enabled: true
    port: 8080
    image:
      repository: user-service
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: user-service-migrate
        tag: c15c7f1
    db:
      existingSecret: users-db
    env:
      SERVICE_NAME: user-service
      DB_SSL_MODE: disable

  test-service:
    enabled: true
    port: 8080
    image:
      repository: test-service
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: test-service-migrate
        tag: c15c7f1
    db:
      existingSecret: tests-db
    env:
      SERVICE_NAME: test-service
      DB_SSL_MODE: disable
      LLM_SERVICE_URL: http://llm-service:8080
      REPORT_SERVICE_URL: http://report-service:8080
      USER_SERVICE_URL: http://user-service:8080
      # Должен быть >= LLM_TIMEOUT_SECONDS llm-service (GigaChat может отвечать долго)
      LLM_ANALYZE_TIMEOUT_SECONDS: "90"

  llm-service:
    enabled: true
    port: 8080
    image:
      repository: llm-service
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: llm-service-migrate
        tag: c15c7f1
    db:
      existingSecret: llm-db
    extraEnvFrom:
      - secretRef:
          name: gigachat-creds
    extraVolumeMounts:
      - name: mincifry-ca
        mountPath: /etc/ssl/mincifry
        readOnly: true
    extraVolumes:
      - name: mincifry-ca
        configMap:
          name: russian-trusted-ca
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    env:
      SERVICE_NAME: llm-service
      DB_SSL_MODE: disable
      LLM_PROVIDER: gigachat
      LLM_API_URL: https://gigachat.devices.sberbank.ru/api/v1
      LLM_OAUTH_URL: https://ngw.devices.sberbank.ru:9443/api/v2/oauth
      LLM_OAUTH_SCOPE: GIGACHAT_API_PERS
      LLM_MODEL: GigaChat
      LLM_TIMEOUT_SECONDS: "60"
      LLM_VERIFY_SSL: "true"
      LLM_CA_BUNDLE: /etc/ssl/mincifry/ca-bundle.crt

  report-service:
    enabled: true
    port: 8080
    image:
      repository: report-service
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: report-service-migrate
        tag: c15c7f1
    db:
      existingSecret: reports-db
    env:
      SERVICE_NAME: report-service
      DB_SSL_MODE: disable

  api-gateway:
    enabled: true
    port: 8080
    image:
      repository: api-gateway
      tag: c15c7f1
      pullPolicy: IfNotPresent
    migrate:
      enabled: false
    db: {}
    env:
      SERVICE_NAME: api-gateway
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8080
      TEST_SERVICE_URL: http://test-service:8080
      LLM_SERVICE_URL: http://llm-service:8080
      REPORT_SERVICE_URL: http://report-service:8080

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: frontend
    tag: c15c7f1
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: mokryakov-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
  tls:
    - hosts:
        - app.mokryakov.local
      secretName: app-mokryakov-local-tls
    - hosts:
        - api.mokryakov.local
      secretName: api-mokryakov-local-tls
  hosts:
    - host: app.mokryakov.local
      service: frontend
    - host: api.mokryakov.local
      service: api-gateway

networkPolicies:
  enabled: true
  dns:
    coreDnsNamespace: kube-system
    coreDnsSelector:
      k8s-app: kube-dns
    nodeLocalDnsCidr: 169.254.20.10/32

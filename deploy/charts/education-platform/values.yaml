global:
  imageRegistry: harbor.mokryakov.local/library

  imagePullSecrets:
    - name: harbor-pull-secret

  serviceAccount:
    create: true
    name: education-platform

  postgres:
    host: education-postgresql.database.svc.cluster.local
    port: "5432"
    database: education
    dbNamespace: database

  secrets:
    jwt:
      name: jwt-secret
    internalJwt:
      name: internal-jwt-secret

defaults:
  replicaCount: 1
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6

services:
  auth-service:
    enabled: true
    port: 8080
    image:
      repository: auth-service
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: auth-service-migrate
        tag: 928c229
    db:
      existingSecret: auth-db
    env:
      SERVICE_NAME: auth-service
      DB_SSL_MODE: disable
      USER_SERVICE_URL: http://user-service:8080

  user-service:
    enabled: true
    port: 8080
    image:
      repository: user-service
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: user-service-migrate
        tag: 928c229
    db:
      existingSecret: users-db
    env:
      SERVICE_NAME: user-service
      DB_SSL_MODE: disable

  test-service:
    enabled: true
    port: 8080
    image:
      repository: test-service
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: test-service-migrate
        tag: 928c229
    db:
      existingSecret: tests-db
    env:
      SERVICE_NAME: test-service
      DB_SSL_MODE: disable
      LLM_SERVICE_URL: http://llm-service:8080
      REPORT_SERVICE_URL: http://report-service:8080

  llm-service:
    enabled: true
    port: 8080
    image:
      repository: llm-service
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: llm-service-migrate
        tag: 928c229
    db:
      existingSecret: llm-db
    extraEnvFrom:
      - secretRef:
          name: gigachat-creds
    env:
      SERVICE_NAME: llm-service
      DB_SSL_MODE: disable
      LLM_PROVIDER: mock

  report-service:
    enabled: true
    port: 8080
    image:
      repository: report-service
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: true
      image:
        repository: report-service-migrate
        tag: 928c229
    db:
      existingSecret: reports-db
    env:
      SERVICE_NAME: report-service
      DB_SSL_MODE: disable

  api-gateway:
    enabled: true
    port: 8080
    image:
      repository: api-gateway
      tag: 928c229
      pullPolicy: IfNotPresent
    migrate:
      enabled: false
    db: {}
    env:
      SERVICE_NAME: api-gateway
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8080
      TEST_SERVICE_URL: http://test-service:8080
      LLM_SERVICE_URL: http://llm-service:8080
      REPORT_SERVICE_URL: http://report-service:8080

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: frontend
    tag: 928c229
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: mokryakov-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
  tls:
    - hosts:
        - app.mokryakov.local
      secretName: app-mokryakov-local-tls
    - hosts:
        - api.mokryakov.local
      secretName: api-mokryakov-local-tls
  hosts:
    - host: app.mokryakov.local
      service: frontend
    - host: api.mokryakov.local
      service: api-gateway

networkPolicies:
  enabled: true
  dns:
    coreDnsNamespace: kube-system
    coreDnsSelector:
      k8s-app: kube-dns
    nodeLocalDnsCidr: 169.254.20.10/32

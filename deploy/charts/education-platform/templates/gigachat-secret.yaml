{{- if .Values.gigachat.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gigachat.secret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ep.labels" (dict "name" "gigachat-creds" "root" .) | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ required "gigachat.secret.apiKey is required when gigachat.secret.create=true" .Values.gigachat.secret.apiKey | quote }}
{{- end }}

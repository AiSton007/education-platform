{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.migrate.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $name }}-migrate
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "ep.labels" (dict "name" $name "root" $root) | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-10"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "ep.labels" (dict "name" $name "root" $root) | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $root.Values.global.serviceAccount.name }}
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $root.Values.defaults.securityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "ep.image" (dict "image" $svc.migrate.image "root" $root) }}
          imagePullPolicy: {{ default "IfNotPresent" $svc.migrate.image.pullPolicy }}
          securityContext:
            {{- toYaml $root.Values.defaults.containerSecurityContext | nindent 12 }}
          env:
            - name: DB_HOST
              value: {{ $root.Values.global.postgres.host | quote }}
            - name: DB_PORT
              value: {{ $root.Values.global.postgres.port | quote }}
            - name: DB_NAME
              value: {{ $root.Values.global.postgres.database | quote }}

            # Alembic imports the service config, so migration containers
            # must receive the same JWT variables as normal service pods.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ dig "global" "secrets" "jwt" "name" "jwt-secret" $root.Values | quote }}
                  key: JWT_SECRET
                  optional: false
            - name: INTERNAL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ dig "global" "secrets" "internalJwt" "name" "internal-jwt-secret" $root.Values | quote }}
                  key: INTERNAL_JWT_SECRET
                  optional: false

            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ $svc.db.existingSecret }}
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
{{- end }}
{{- end }}

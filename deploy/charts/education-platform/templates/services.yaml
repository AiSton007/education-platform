{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "ep.labels" (dict "name" $name "root" $) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ep.selectorLabels" (dict "name" $name "root" $) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port | default 8080 }}
      targetPort: 8080
      protocol: TCP
{{- end }}
{{- end }}
{{- if .Values.frontend.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ep.labels" (dict "name" "frontend" "root" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ep.selectorLabels" (dict "name" "frontend" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}

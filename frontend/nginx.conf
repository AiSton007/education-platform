server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpe?g|gif|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
